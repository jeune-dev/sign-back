# ============================================================
#  Sign API — Docker Compose PRODUCTION
#  Usage : docker compose -f docker-compose.prod.yml up -d --build
#
#  Prérequis :
#   • Fichier .env rempli (copie de .env.example)
#   • Certificats Nginx / Let's Encrypt installés sur l'hôte
#   • Répertoires /var/www/sign-api/logs et /var/www/sign-api/uploads existants
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sign_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:            ${DB_NAME}
      POSTGRES_USER:          ${DB_USER}
      POSTGRES_PASSWORD:      ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS:   "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script d'init optionnel (ex: création extension pgcrypto)
      - ./deploy/initdb:/docker-entrypoint-initdb.d:ro
    # PAS d'exposition du port en production — accessible uniquement via le réseau Docker
    expose:
      - "5432"
    networks:
      - sign_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend Node.js ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Pas de cache lors d'un déploiement propre : ajouter --no-cache si besoin
    image: sign-api:latest
    container_name: sign_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # En production : Nginx écoute sur 443 et proxifie vers 127.0.0.1:3000
    # On publie uniquement sur 127.0.0.1 (loopback) pour que Nginx seul y accède
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     postgres
      DB_PORT:     5432
      LOG_DIR:     /app/logs
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - sign_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    # Limites ressources (adapter selon VPS)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  sign_network:
    driver: bridge
    # Réseau isolé — seuls les conteneurs de ce Compose se voient
    internal: false

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
