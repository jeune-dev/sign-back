# ============================================================
#  Sign API — Configuration Nginx (Contabo VPS Ubuntu)
#  Remplacer : YOUR_DOMAIN par votre vrai domaine
#              ex: api.signapp.com
#  Déposer dans : /etc/nginx/sites-available/sign-api
#  Activer via  : ln -sf /etc/nginx/sites-available/sign-api \
#                        /etc/nginx/sites-enabled/sign-api
# ============================================================

# Upstream Node.js (facilite les changements de port)
upstream sign_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Redirection HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Certbot ACME challenge (renouvellement automatique)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Serveur HTTPS principal ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # ── Certificats Let's Encrypt (générés par Certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS durci ─────────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Headers sécurité ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # ── Taille max des uploads (Multer 5 MB + marge) ─────────────────────────
    client_max_body_size  10M;
    client_body_timeout   30s;
    client_header_timeout 10s;
    send_timeout          30s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        application/xml;

    # ── Health check direct (pas de log) ─────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass         http://sign_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection "";
    }

    # ── Proxy vers l'API Node.js ──────────────────────────────────────────────
    location / {
        proxy_pass         http://sign_backend;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Headers transmis à Express (nécessaires pour trust proxy + IP réelle)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Désactiver le buffering pour les réponses longues (PDF, exports)
        proxy_buffering    off;
        proxy_buffer_size  4k;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/sign-api-access.log combined;
    error_log  /var/log/nginx/sign-api-error.log warn;
}

# ── Map nécessaire pour WebSocket upgrade ─────────────────────────────────────
# (À placer dans /etc/nginx/nginx.conf → section http{} ou dans un fichier conf.d/)
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
