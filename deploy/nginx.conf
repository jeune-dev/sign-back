# ============================================================
#  Sign API — Configuration Nginx (Contabo VPS Ubuntu)
#  Remplacer : YOUR_DOMAIN par votre vrai domaine
#              ex: api.signapp.com
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Certbot renouvelle via ce chemin
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://\;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── Certificats Let's Encrypt (Certbot) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL durci ────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Taille max des uploads (multer memoryStorage — fichiers 5 MB max) ──
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 10s;
    send_timeout         30s;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Health check direct (pas de log) ─────────────────────
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host ;
    }

    # ── Proxy vers l'API Node.js ─────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (si nécessaire plus tard)
        proxy_set_header Upgrade    ;
        proxy_set_header Connection "upgrade";

        # Headers transmis à Express
        proxy_set_header Host              ;
        proxy_set_header X-Real-IP         ;
        proxy_set_header X-Forwarded-For   ;
        proxy_set_header X-Forwarded-Proto ;

        proxy_cache_bypass ;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Désactiver la mise en tampon pour les réponses longues (PDF, exports)
        proxy_buffering    off;
        proxy_buffer_size  4k;
    }

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/sign-api-access.log combined;
    error_log  /var/log/nginx/sign-api-error.log warn;
}
